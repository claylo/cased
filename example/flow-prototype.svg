<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 350" font-family="system-ui, -apple-system, sans-serif">

  <!-- Spine -->
  <line x1="150" y1="24" x2="150" y2="324" stroke="#d1d5db" stroke-width="1"/>

  <!-- Step 1: start — solid circle -->
  <circle cx="150" cy="24" r="4" fill="#1a1a1a"/>
  <text x="140" y="28" text-anchor="end" font-size="11" fill="#1a1a1a">Index locations</text>

  <!-- Step 2: process — hollow circle -->
  <circle cx="150" cy="84" r="4" fill="#fffff8" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="140" y="88" text-anchor="end" font-size="11" fill="#1a1a1a">validate_locations()</text>

  <!-- Step 3: decision — hollow diamond -->
  <rect x="146" y="140" width="8" height="8" fill="#fffff8" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(45 150 144)"/>
  <text x="140" y="148" text-anchor="end" font-size="11" fill="#1a1a1a">Alias available?</text>

  <!-- Finding 1: Suppresses unresolved (SIGNIFICANT) -->
  <line x1="157" y1="144" x2="195" y2="144" stroke="#dc2626" stroke-width="1.5"/>
  <line x1="195" y1="135" x2="195" y2="166" stroke="#dc2626" stroke-width="1.5"/>
  <text x="205" y="140" font-size="10" font-weight="600" fill="#dc2626">Suppresses unresolved</text>
  <text x="205" y="152" font-size="8.5" fill="#6b7280" font-style="italic">silently ignores unresolved aliases</text>
  <text x="205" y="164" font-size="7.5" fill="rgba(220,38,38,0.7)" font-weight="500" letter-spacing="0.5">SIGNIFICANT</text>

  <!-- Chain reference: enables -->
  <line x1="195" y1="166" x2="195" y2="255" stroke="#6b7280" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="200" y="214" font-size="7" fill="#6b7280">enables</text>

  <!-- Step 4: process — hollow circle -->
  <circle cx="150" cy="204" r="4" fill="#fffff8" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="140" y="208" text-anchor="end" font-size="11" fill="#1a1a1a">Detect main files</text>

  <!-- Step 5: decision — hollow diamond -->
  <rect x="146" y="260" width="8" height="8" fill="#fffff8" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(45 150 264)"/>
  <text x="140" y="268" text-anchor="end" font-size="11" fill="#1a1a1a">Path identity?</text>

  <!-- Finding 2: Substring match (MODERATE) -->
  <line x1="157" y1="264" x2="195" y2="264" stroke="#1a1a1a" stroke-width="1.5"/>
  <line x1="195" y1="255" x2="195" y2="286" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="205" y="260" font-size="10" font-weight="500" fill="#1a1a1a">Substring match</text>
  <text x="205" y="272" font-size="8.5" fill="#6b7280" font-style="italic">path identity uses .contains()</text>
  <text x="205" y="284" font-size="7.5" fill="#6b7280" font-weight="500" letter-spacing="0.5">MODERATE</text>

  <!-- Step 6: end — bull's-eye -->
  <circle cx="150" cy="324" r="4" fill="#1a1a1a"/>
  <circle cx="150" cy="324" r="2" fill="#fffff8"/>
  <text x="140" y="328" text-anchor="end" font-size="11" fill="#6b7280">Build index</text>

</svg>