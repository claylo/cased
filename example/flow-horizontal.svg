<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 130" font-family="system-ui, -apple-system, sans-serif">

  <!-- Spine (horizontal) -->
  <line x1="50" y1="50" x2="650" y2="50" stroke="#d1d5db" stroke-width="1"/>

  <!-- Step 1: start — solid circle -->
  <circle cx="50" cy="50" r="4" fill="#1a1a1a"/>
  <text x="50" y="38" text-anchor="middle" font-size="11" fill="#1a1a1a">Index locations</text>

  <!-- Step 2: process — hollow circle -->
  <circle cx="170" cy="50" r="4" fill="#fffff8" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="170" y="38" text-anchor="middle" font-size="11" fill="#1a1a1a">validate_locations()</text>

  <!-- Step 3: decision — hollow diamond -->
  <rect x="286" y="46" width="8" height="8" fill="#fffff8" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(45 290 50)"/>
  <text x="290" y="38" text-anchor="middle" font-size="11" fill="#1a1a1a">Alias available?</text>

  <!-- Finding 1: Suppresses unresolved (SIGNIFICANT) -->
  <line x1="290" y1="57" x2="290" y2="72" stroke="#dc2626" stroke-width="1.5"/>
  <text x="290" y="84" text-anchor="middle" font-size="10" font-weight="600" fill="#dc2626">Suppresses unresolved</text>
  <text x="290" y="96" text-anchor="middle" font-size="8.5" fill="#6b7280" font-style="italic">silently ignores unresolved aliases</text>
  <text x="290" y="108" text-anchor="middle" font-size="7.5" fill="rgba(220,38,38,0.7)" font-weight="500" letter-spacing="0.5">SIGNIFICANT</text>

  <!-- Step 4: process — hollow circle -->
  <circle cx="410" cy="50" r="4" fill="#fffff8" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="410" y="38" text-anchor="middle" font-size="11" fill="#1a1a1a">Detect main files</text>

  <!-- Step 5: decision — hollow diamond -->
  <rect x="526" y="46" width="8" height="8" fill="#fffff8" stroke="#1a1a1a" stroke-width="1.5" transform="rotate(45 530 50)"/>
  <text x="530" y="38" text-anchor="middle" font-size="11" fill="#1a1a1a">Path identity?</text>

  <!-- Finding 2: Substring match (MODERATE) -->
  <line x1="530" y1="57" x2="530" y2="72" stroke="#1a1a1a" stroke-width="1.5"/>
  <text x="530" y="84" text-anchor="middle" font-size="10" font-weight="500" fill="#1a1a1a">Substring match</text>
  <text x="530" y="96" text-anchor="middle" font-size="8.5" fill="#6b7280" font-style="italic">path identity uses .contains()</text>
  <text x="530" y="108" text-anchor="middle" font-size="7.5" fill="#6b7280" font-weight="500" letter-spacing="0.5">MODERATE</text>

  <!-- Chain reference: enables (horizontal between finding areas) -->
  <line x1="290" y1="115" x2="530" y2="115" stroke="#6b7280" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="410" y="125" text-anchor="middle" font-size="7" fill="#6b7280">enables</text>

  <!-- Step 6: end — bull's-eye -->
  <circle cx="650" cy="50" r="4" fill="#1a1a1a"/>
  <circle cx="650" cy="50" r="2" fill="#fffff8"/>
  <text x="650" y="38" text-anchor="middle" font-size="11" fill="#6b7280">Build index</text>

</svg>