<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 120" font-family="system-ui, -apple-system, sans-serif">

  <!-- Spine (horizontal) -->
  <line x1="18" y1="40" x2="272" y2="40" stroke="#e8e8e8" stroke-width="0.75"/>

  <!-- Step 1: start — filled circle -->
  <circle cx="18" cy="40" r="2" fill="#444"/>
  <text x="18" y="33" text-anchor="middle" font-size="7.5" fill="#444">Index</text>
  <text x="18" y="26" text-anchor="middle" font-size="7.5" fill="#444">locations</text>

  <!-- Step 2: process — hollow circle -->
  <circle cx="80" cy="40" r="2" fill="white" stroke="#444" stroke-width="0.8"/>
  <text x="80" y="33" text-anchor="middle" font-size="7.5" fill="#444">validate_</text>
  <text x="80" y="26" text-anchor="middle" font-size="7.5" fill="#444">locations()</text>

  <!-- Step 3: decision -->
  <polygon points="152,36 156,40 152,44 148,40" fill="white" stroke="#666" stroke-width="0.8"/>
  <text x="152" y="33" text-anchor="middle" font-size="7.5" fill="#444">Alias</text>
  <text x="152" y="26" text-anchor="middle" font-size="7.5" fill="#444">available?</text>

  <!-- Finding 1: arrow FROM annotation TO step, pointing up -->
  <text x="152" y="60" text-anchor="middle" font-size="7" font-weight="600" fill="#dc2626">Suppresses unresolved</text>
  <text x="152" y="68" text-anchor="middle" font-size="5.5" fill="#dc2626">SIGNIFICANT</text>
  <line x1="152" y1="53" x2="152" y2="47" stroke="#d0d0d0" stroke-width="0.5"/>
  <polygon points="152,47 149.5,49.5 154.5,49.5" fill="#d0d0d0"/>

  <!-- Step 4: process — hollow circle -->
  <circle cx="212" cy="40" r="2" fill="white" stroke="#444" stroke-width="0.8"/>
  <text x="212" y="33" text-anchor="middle" font-size="7.5" fill="#444">Detect</text>
  <text x="212" y="26" text-anchor="middle" font-size="7.5" fill="#444">main files</text>

  <!-- Step 5: decision -->
  <polygon points="272,36 276,40 272,44 268,40" fill="white" stroke="#666" stroke-width="0.8"/>
  <text x="272" y="33" text-anchor="middle" font-size="7.5" fill="#444">Path</text>
  <text x="272" y="26" text-anchor="middle" font-size="7.5" fill="#444">identity?</text>

  <!-- Finding 2: arrow FROM annotation TO step, pointing up -->
  <text x="272" y="60" text-anchor="middle" font-size="7" font-weight="600" fill="#444">Substring match</text>
  <text x="272" y="68" text-anchor="middle" font-size="5.5" fill="#444">MODERATE</text>
  <line x1="272" y1="53" x2="272" y2="47" stroke="#d0d0d0" stroke-width="0.5"/>
  <polygon points="272,47 269.5,49.5 274.5,49.5" fill="#d0d0d0"/>

  <!-- Chain reference -->
  <line x1="174" y1="60" x2="250" y2="60" stroke="#ddd" stroke-width="0.4" stroke-dasharray="2,2"/>
  <text x="212" y="57" text-anchor="middle" font-size="5.5" fill="#ccc">enables</text>

</svg>