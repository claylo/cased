audit_date: 2026-03-21
scope: current-repo-review
commit: 8a027bfb55da46d8cc0ee150edc01497b511c63b
assessment: >
  This audit of the colophon codebase at commit 8a027bf identifies three findings across two
  narrative surfaces. The codebase is in active development with recent validation work that
  improves location hygiene, but two location-truthfulness gaps remain: curate silently discards
  unresolved locations when no alias suggestion is available, and main-file detection uses
  substring matching that can produce false positives on overlapping path fragments. A third
  finding in the text-boundary surface flags offset drift under Unicode case folds that expand
  byte length. None of the findings are critical — the tool operates correctly for ASCII English
  manuscripts — but the silent suppression issue is significant because it defeats the purpose of
  the validation pass in CI contexts.
narratives:
  - slug: location-truthfulness
    title: The Location Truthfulness Surface
    thesis: Recent validation work improves visibility, but two code paths still let the index claim confidence it has not actually earned.
    flow:
      - id: index
        label: Index locations
        type: start
      - id: validate
        label: validate_locations()
      - id: alias
        label: Alias available?
        type: decision
        no: drop-location
        findings:
          - slug: curate-validation-suppresses-unresolved-without-suggestion
            label: Suppresses unresolved
      - id: detect
        label: Detect main files
      - id: identity
        label: Path identity?
        type: decision
        no: normalize
        findings:
          - slug: main-file-detection-uses-substring-match
            label: Substring match
      - id: build
        label: Build index
        type: end
      # Off-spine branches
      - id: drop-location
        label: Drop silently
        type: end
        spine: false
      - id: normalize
        label: Normalize paths
        next: detect
        spine: false
    verdict: The pipeline can silently preserve broken locations and can over-mark non-main files as substantive.
    findings:
      - slug: curate-validation-suppresses-unresolved-without-suggestion
        title: Curate Validation Suppresses Unresolved Without Suggestion
        concern: significant
        locations:
          - path: crates/colophon/src/commands/curate.rs
            start_line: 58
            end_line: 66
        evidence: |
          let report =
              colophon_core::validate::validate_locations(terms, &terms.source_dir, source_extensions);
          if !report.suggestions.is_empty() {
              eprintln!(
                  "Validation: {} resolved, {} unresolved",
                  report.resolved, report.unresolved
              );
          }
        evidence_lang: rust
        evidence_markers:
          - lines: "3"
            type: del
            label: "only prints when suggestions exist"
        mechanism: >
          Curate only prints validation output when at least one alias suggestion exists. Missing
          files and plain unresolved locations increment `report.unresolved`, but they produce no
          operator-visible warning if the heuristic cannot suggest an alias. That means the new
          validation pass can fail and still look clean at the CLI, which defeats the purpose of
          catching bad locations before render.
        remediation: >
          Print a validation summary whenever `report.unresolved > 0`, and include unresolved file
          paths even when no alias can be suggested. A failing or warning exit mode would be better
          for CI.
        temporal:
          introduced: "2026-03-21"
          last_modified: "2026-03-21"
          commit_count: 1
        chains:
          enables:
            - main-file-detection-uses-substring-match
      - slug: main-file-detection-uses-substring-match
        title: Main File Detection Uses Substring Match
        concern: moderate
        locations:
          - path: crates/colophon-core/src/curate/mod.rs
            start_line: 348
            end_line: 351
        evidence: |
          let is_main = ct
              .main_files
              .iter()
              .any(|mf| loc.file.contains(mf.as_str()));
        evidence_lang: rust
        evidence_markers:
          - lines: "4"
            type: del
            label: "substring, not identity"
        mechanism: >
          `main_files` is treated as a substring, not a path identity check. A term marked main
          for `auth.md` will also mark `chapters/auth.md.bak`, `old-auth.md`, or any other path
          containing that fragment as substantive. The result is quietly incorrect bold page numbers
          in the rendered index, which is exactly the metadata the curation step is supposed to
          preserve accurately.
        remediation: >
          Normalize both sides to repository-relative paths and compare for exact equality. Add a
          regression test with overlapping names such as `auth.md` and `old-auth.md`.
        temporal:
          introduced: "2026-03-19"
          last_modified: "2026-03-21"
          commit_count: 3
        chains:
          enabled_by:
            - curate-validation-suppresses-unresolved-without-suggestion
  - slug: text-boundary-accounting
    title: The Text Boundary Surface
    thesis: Case-insensitive matching is implemented by lowercasing whole buffers and then reusing those offsets against the original source, which is only safe for ASCII-stable case folds.
    verdict: The matcher is robust for English ASCII inputs, but it is not correct for general Unicode text.
    findings:
      - slug: unicode-casefold-offsets-drift-from-source
        title: Unicode Case Fold Offsets Drift From Source
        concern: moderate
        locations:
          - path: crates/colophon-core/src/render/mod.rs
            start_line: 106
            end_line: 109
          - path: crates/colophon-core/src/typst_prose.rs
            start_line: 101
            end_line: 118
        evidence: |
          let lower_text = text.to_lowercase();
          let lower_term = term.to_lowercase();
          lower_text.find(&lower_term).map(|pos| pos + term.len())

          let lower_source = source.to_lowercase();
          let lower_term = term.to_lowercase();
          let abs_pos = start + pos;
          let abs_end = abs_pos + lower_term.len();
        evidence_lang: rust
        evidence_markers:
          - lines: "1-3"
            type: mark
          - lines: "5-8"
            type: mark
        mechanism: >
          Lowercasing can change byte lengths and byte positions for Unicode text (`İ`, Greek sigma
          variants, Lithuanian dotted forms, and others). Once offsets are computed against the
          lowercased buffer, they are no longer guaranteed to be valid offsets in the original
          source. That can produce wrong insertion points, false negatives, or invalid
          prose-boundary checks in exactly the multilingual manuscripts this tool is likely to see.
        remediation: Use Unicode-aware case-insensitive matching that preserves original spans, or scan the original string by grapheme/char boundaries while comparing normalized slices. Add tests with at least one expanding case fold.
        temporal:
          introduced: "2026-03-20"
          last_modified: "2026-03-21"
          commit_count: 2
        chains: {}
summary:
