<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" role="img" aria-label="Codebase terrain map: tokio-relay modules with finding density overlay">

  <!-- Edges (coupling lines, drawn first) -->
  <!-- main → server -->
  <line x1="120" y1="200" x2="250" y2="200" style="stroke: #d1d5db; stroke-width: 1;" />
  <!-- server → relay -->
  <line x1="310" y1="200" x2="390" y2="170" style="stroke: #d1d5db; stroke-width: 2;" />
  <!-- server → config -->
  <line x1="310" y1="200" x2="280" y2="310" style="stroke: #d1d5db; stroke-width: 3;" />
  <!-- relay → auth -->
  <line x1="480" y1="170" x2="560" y2="280" style="stroke: #d1d5db; stroke-width: 3;" />
  <!-- relay → channel -->
  <line x1="480" y1="170" x2="450" y2="310" style="stroke: #d1d5db; stroke-width: 4;" />
  <!-- auth → config -->
  <line x1="530" y1="280" x2="310" y2="310" style="stroke: #d1d5db; stroke-width: 2;" />

  <!-- Module: main (24 lines — smallest) -->
  <g transform="translate(100, 200)">
    <rect x="-30" y="-18" width="60" height="36" rx="4" ry="4"
          style="fill: #f0fdf4; stroke: #1a1a1a; stroke-width: 1;" />
    <text font-family="Atkinson Hyperlegible Next, sans-serif" x="0" y="4"
          style="font-family: -apple-system, system-ui, sans-serif; font-size: 11px; fill: #1a1a1a; text-anchor: middle;">main</text>
  </g>

  <!-- Module: server (156 lines) -->
  <g transform="translate(270, 200)">
    <rect x="-45" y="-26" width="90" height="52" rx="4" ry="4"
          style="fill: #f0fdf4; stroke: #1a1a1a; stroke-width: 1;" />
    <text font-family="Atkinson Hyperlegible Next, sans-serif" x="0" y="4"
          style="font-family: -apple-system, system-ui, sans-serif; font-size: 11px; fill: #1a1a1a; text-anchor: middle;">server</text>
  </g>

  <!-- Module: relay (412 lines — largest, 2 findings → stroke 3) -->
  <g transform="translate(440, 150)">
    <rect x="-65" y="-36" width="130" height="72" rx="4" ry="4"
          style="fill: #fafafa; stroke: #1a1a1a; stroke-width: 3;" />
    <text font-family="Atkinson Hyperlegible Next, sans-serif" x="0" y="4"
          style="font-family: -apple-system, system-ui, sans-serif; font-size: 11px; fill: #1a1a1a; text-anchor: middle;">relay</text>
    <text font-family="Atkinson Hyperlegible Next, sans-serif" x="58" y="-22"
          style="font-family: -apple-system, system-ui, sans-serif; font-size: 9px; fill: #6b7280; text-anchor: end;">2</text>
  </g>

  <!-- Module: channel (287 lines, 0 findings) -->
  <g transform="translate(420, 310)">
    <rect x="-55" y="-30" width="110" height="60" rx="4" ry="4"
          style="fill: #f0fdf4; stroke: #1a1a1a; stroke-width: 1;" />
    <text font-family="Atkinson Hyperlegible Next, sans-serif" x="0" y="4"
          style="font-family: -apple-system, system-ui, sans-serif; font-size: 11px; fill: #1a1a1a; text-anchor: middle;">channel</text>
  </g>

  <!-- Module: auth (234 lines, 3 findings including critical → stroke 4 + red inner) -->
  <g transform="translate(570, 280)">
    <rect x="-50" y="-28" width="100" height="56" rx="4" ry="4"
          style="fill: #fafafa; stroke: #1a1a1a; stroke-width: 4;" />
    <rect x="-47" y="-25" width="94" height="50" rx="3" ry="3"
          style="fill: none; stroke: #dc2626; stroke-width: 1;" />
    <text font-family="Atkinson Hyperlegible Next, sans-serif" x="0" y="4"
          style="font-family: -apple-system, system-ui, sans-serif; font-size: 11px; fill: #1a1a1a; text-anchor: middle;">auth</text>
    <text font-family="Atkinson Hyperlegible Next, sans-serif" x="43" y="-14"
          style="font-family: -apple-system, system-ui, sans-serif; font-size: 9px; fill: #6b7280; text-anchor: end;">3</text>
  </g>

  <!-- Module: config (68 lines, 1 finding → stroke 2) -->
  <g transform="translate(270, 310)">
    <rect x="-38" y="-22" width="76" height="44" rx="4" ry="4"
          style="fill: #fafafa; stroke: #1a1a1a; stroke-width: 2;" />
    <text font-family="Atkinson Hyperlegible Next, sans-serif" x="0" y="4"
          style="font-family: -apple-system, system-ui, sans-serif; font-size: 11px; fill: #1a1a1a; text-anchor: middle;">config</text>
    <text font-family="Atkinson Hyperlegible Next, sans-serif" x="31" y="-8"
          style="font-family: -apple-system, system-ui, sans-serif; font-size: 9px; fill: #6b7280; text-anchor: end;">1</text>
  </g>

  <!-- Boundary annotation: auth boundary -->
  <rect x="220" y="255" width="400" height="100" rx="8" ry="8"
        style="fill: none; stroke: #6b7280; stroke-width: 0.5; stroke-dasharray: 4,4;" />
  <text font-family="Atkinson Hyperlegible Next, sans-serif" x="230" y="348"
        style="font-family: -apple-system, system-ui, sans-serif; font-size: 9px; fill: #6b7280;">auth boundary</text>

  <!-- Boundary annotation: websocket input -->
  <rect x="365" y="105" width="160" height="120" rx="8" ry="8"
        style="fill: none; stroke: #6b7280; stroke-width: 0.5; stroke-dasharray: 4,4;" />
  <text font-family="Atkinson Hyperlegible Next, sans-serif" x="375" y="120"
        style="font-family: -apple-system, system-ui, sans-serif; font-size: 9px; fill: #6b7280;">ws input surface</text>

  <!-- Legend -->
  <g transform="translate(20, 365)">
    <text font-family="Atkinson Hyperlegible Next, sans-serif" style="font-family: -apple-system, system-ui, sans-serif; font-size: 9px; fill: #6b7280;">node size ∝ code volume</text>
    <text font-family="Atkinson Hyperlegible Next, sans-serif" y="12" style="font-family: -apple-system, system-ui, sans-serif; font-size: 9px; fill: #6b7280;">border weight ∝ finding density</text>
    <text font-family="Atkinson Hyperlegible Next, sans-serif" y="24" style="font-family: -apple-system, system-ui, sans-serif; font-size: 9px; fill: #6b7280;">dashed regions = trust boundaries</text>
  </g>

</svg>
